# Perfil de Desarrollo (H2 In-memory)
spring.datasource.url=jdbc:h2:mem:algoritmiadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mostrar SQL en consola
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Habilitar consola H2
spring.h2.console.enabled=true

# Desactivar Redis y RabbitMQ para desarrollo ligero si es necesario
spring.cache.type=none
spring.rabbitmq.template.mandatory=false
